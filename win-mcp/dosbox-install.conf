# DOSBox-X config for Windows 3.1 installation
# Uses host directories instead of disk images for simplicity

[sdl]
autolock=false
waitonerror=false
output=surface

[dosbox]
title=Win31 Install
memsize=16
machine=svga_s3

[cpu]
core=normal
cputype=386
cycles=max

[render]
scaler=none
aspect=false

[midi]
mpu401=none
mididevice=none

[sblaster]
sbtype=sb16

[gus]
gus=false

[speaker]
pcspeaker=true
tandy=off

[serial]
serial1=disabled
serial2=disabled
serial3=disabled
serial4=disabled

[dos]
# Hard drives and mounts configured in autoexec

[autoexec]
# C: = hard drive contents (persists after install)
MOUNT C ../../tools/win31-hdd
# D: = Windows 3.1 setup files (extracted from floppies)
MOUNT D ../../tools/win31-staging
# S: = share directory for MCP IPC
MOUNT S ../share
C:
