# DOSBox-X config for Windows 3.1 with WIN-MCP
# Boots Windows 3.1 from tools/win31-hdd, auto-starts WINMCP.EXE

[sdl]
autolock=true
waitonerror=false
output=surface
control_port=10199

[dosbox]
title=Win31-MCP
memsize=16
machine=svga_s3trio64v+
quit warning=false
vmemsize=4

[cpu]
core=normal
cputype=386
cycles=max

[render]
scaler=none
aspect=false

[midi]
mpu401=none
mididevice=none

[sblaster]
sbtype=sb16

[gus]
gus=false

[speaker]
pcspeaker=true
tandy=off

[serial]
serial1=disabled
serial2=disabled
serial3=disabled
serial4=disabled

[dos]
# Hard drives and mounts configured in autoexec

[autoexec]
# C: = Windows 3.1 hard drive
MOUNT C ../tools/win31-hdd
# S: = share directory (IPC via _MAGIC_)
MOUNT S ../share
MKDIR S:\_MAGIC_
C:
CD \WINDOWS
WIN
