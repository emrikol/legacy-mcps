# DOSBox-X config for WIN-MCP test harness
# Runs the stub (or real Win16 app) and provides file IPC via mounted host dir

[sdl]
autolock=false
waitonerror=false
output=surface

[dosbox]
title=WIN-MCP Test
memsize=16
machine=svga_s3

[cpu]
core=normal
cputype=386
cycles=max

[render]
scaler=none
aspect=false

[midi]
mpu401=none
mididevice=none

[sblaster]
sbtype=none

[gus]
gus=false

[speaker]
pcspeaker=false
tandy=off

[serial]
serial1=disabled
serial2=disabled
serial3=disabled
serial4=disabled

[dos]
# Hard drives and mounts configured in autoexec

[autoexec]
# Mount C: as the src directory (where WINSTUB.COM lives)
MOUNT C src
# Mount S: as the share directory (where _MAGIC_ lives)
# Note: Z: is reserved by DOSBox-X for internal virtual drive
MOUNT S ../share
# Create magic dir if needed, then run stub
MKDIR S:\_MAGIC_
C:
WINSTUB.COM S:
