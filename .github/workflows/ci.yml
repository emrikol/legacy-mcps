name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dos-mcp:
    name: DOS MCP tests (headless)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y nasm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build patched emu2
        run: |
          git clone https://github.com/dmsc/emu2.git /tmp/emu2-src
          cd /tmp/emu2-src
          git checkout 4948d1e
          git apply $GITHUB_WORKSPACE/patches/emu2-mcp.diff
          make
          cp emu2 $GITHUB_WORKSPACE/tools/emu2

      - name: Build and test DOS MCP
        run: |
          cd dos-mcp
          make test
