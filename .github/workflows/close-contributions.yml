name: Allow only collaborator PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  issues: write

jobs:
  gatekeep:
    if: ${{ !contains(fromJson('["OWNER","COLLABORATOR"]'), github.event.pull_request.author_association)
            && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            await github.rest.issues.createComment({
              owner, repo, issue_number: pr,
              body: 'This is a personal project published as-is under the GPL v2. Pull requests are not accepted from the public.\n\nFeel free to fork and continue development under the GPL.'
            });

            await github.rest.pulls.update({
              owner, repo, pull_number: pr, state: 'closed'
            });
