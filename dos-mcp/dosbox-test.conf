# DOSBox-X config for MCP TSR automated testing
#
# Mounts the share directory as Z: (same as WFW 3.11 sees it)
# and the tsr build directory as C:
# Runs DOSMCP.COM as a foreground polling loop.
# The host-side test harness (test-harness.js) drives tests via file I/O
# and kills DOSBox-X when done.
#
# Ref: dosbox-mount-caching.md — nocachedir is CRITICAL for host-written
#      files to be visible to DOS programs immediately.

[sdl]
fullscreen=false
output=surface
windowresolution=640x400
autolock=false

[cpu]
cycles=max

[dosbox]
# Disable directory caching so host-written TX files are immediately visible
nocachedir=true

[autoexec]
# Mount the src build dir as C:
mount c src
# Mount the share as S: (Z: is reserved by DOSBox-X)
mount s ../share
# Create _MAGIC_ dir on S: if it doesn't exist
MKDIR S:\_MAGIC_
c:

# Run DOSMCP.COM in TSR mode — installs timer hook and returns to DOS
DOSMCP.COM S: /T
